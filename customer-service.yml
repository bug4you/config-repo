global:
  message: "Welcome to customer service dev environment (H2 Mode)!!"

server:
  port: 8082

message: "Hello from Dev with H2 Database!"

spring:
  datasource:
    # H2 uchun URL (mem:testdb - xotirada saqlaydi)
    url: jdbc:h2:mem:customer_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  
  # H2 Console'ni brauzerda ko'rish uchun yoqish
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
